name: Sandtrace Security Scan

on:
  workflow_call:
    secrets:
      SANDTRACE_API_KEY:
        required: false
      SANDTRACE_CLOUD_URL:
        required: false

permissions:
  contents: read
  security-events: write

env:
  SANDTRACE_VERSION: '0.2.9'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SANDTRACE_API_KEY: ${{ secrets.SANDTRACE_API_KEY }}
      SANDTRACE_CLOUD_URL: ${{ secrets.SANDTRACE_CLOUD_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sandtrace
        run: |
          curl -sSfL "https://github.com/sandtrace/sandtrace/releases/download/v${SANDTRACE_VERSION}/sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o sandtrace.tar.gz
          tar xzf sandtrace.tar.gz
          sudo mv sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu/sandtrace /usr/local/bin/
          rm -rf sandtrace.tar.gz sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu

      - name: Initialize sandtrace
        run: sandtrace init

      - name: Run audit
        run: sandtrace audit . --severity medium

      - name: Generate and upload SBOM
        if: ${{ secrets.SANDTRACE_API_KEY != '' && secrets.SANDTRACE_CLOUD_URL != '' }}
        run: sandtrace sbom . --output sandtrace.bom.json

      - name: Run obfuscation scan
        run: sandtrace scan . --verbose

      - name: Generate SARIF report
        if: always()
        run: sandtrace audit . --format sarif --severity medium > sandtrace.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sandtrace.sarif
          category: sandtrace
