name: Sandtrace Security Scan

on:
  workflow_call:
    inputs:
      sandtrace_cloud_url:
        required: false
        type: string
      deep:
        required: false
        type: boolean
        default: true
    secrets:
      SANDTRACE_API_KEY:
        required: false
      SANDTRACE_CLOUD_URL:
        required: false
      SANDTRACE_DOWNLOAD_TOKEN:
        # PAT with read access to the private cc-consulting-nv/sandtrace repo,
        # used to download the release binary. Optional: when omitted the job's
        # GITHUB_TOKEN is used (works only if the caller's token can read it).
        required: false

permissions:
  actions: read
  contents: read
  security-events: write

env:
  SANDTRACE_VERSION: '0.3.19'
  # Releases live on the private cc-consulting-nv/sandtrace fork; the public
  # upstream lags (manual promotion gate). Download with gh + GITHUB_TOKEN.
  SANDTRACE_REPO: 'cc-consulting-nv/sandtrace'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SANDTRACE_API_KEY: ${{ secrets.SANDTRACE_API_KEY }}
      SANDTRACE_CLOUD_URL: ${{ inputs.sandtrace_cloud_url || secrets.SANDTRACE_CLOUD_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sandtrace
        # cc-consulting-nv/sandtrace is private, so the release asset is fetched
        # with gh (authenticated). SANDTRACE_DOWNLOAD_TOKEN is a PAT with read
        # access to that repo; falls back to the job's GITHUB_TOKEN when the
        # caller lives in the same org and has access.
        env:
          GH_TOKEN: ${{ secrets.SANDTRACE_DOWNLOAD_TOKEN || secrets.GITHUB_TOKEN }}
        run: |
          asset="sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu.tar.gz"
          gh release download "v${SANDTRACE_VERSION}" \
            --repo "${SANDTRACE_REPO}" \
            --pattern "${asset}" \
            --output sandtrace.tar.gz
          tar xzf sandtrace.tar.gz
          sudo mv "sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu/sandtrace" /usr/local/bin/
          rm -rf sandtrace.tar.gz "sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu"
          sandtrace --version

      - name: Initialize sandtrace
        run: sandtrace init

      - name: Run audit
        # Gate at CRITICAL only. With --deep on, medium/high includes direct-dep
        # version freshness (a fresh upstream release is advisory, not a failure).
        # Genuine criticals (public-registry typosquats, real package-not-found)
        # still block. Medium/high are surfaced via the SARIF report below.
        run: sandtrace audit . --severity critical ${{ inputs.deep && '--deep' || '' }}

      - name: Generate and upload SBOM
        if: ${{ env.SANDTRACE_API_KEY != '' && env.SANDTRACE_CLOUD_URL != '' }}
        run: sandtrace sbom . --output sandtrace.bom.json

      - name: Run obfuscation scan
        run: sandtrace scan . --verbose

      - name: Generate SARIF report
        if: always()
        run: sandtrace audit . --format sarif --severity medium > sandtrace.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sandtrace.sarif
          category: sandtrace
