name: Sandtrace Security Scan

on:
  workflow_call:
    inputs:
      sandtrace_cloud_url:
        required: false
        type: string
      deep:
        required: false
        type: boolean
        default: true
    secrets:
      SANDTRACE_API_KEY:
        required: false
      SANDTRACE_CLOUD_URL:
        required: false

permissions:
  actions: read
  contents: read
  security-events: write

env:
  SANDTRACE_VERSION: '0.3.19'
  # Public upstream release. Downloaded unauthenticated, so any caller repo
  # works with no PAT wiring. (The private cc-consulting-nv/sandtrace fork is
  # unreachable from a caller's repo-scoped GITHUB_TOKEN; that previously broke
  # every scan with "Could not resolve to a Repository".)
  SANDTRACE_REPO: 'sandtrace/sandtrace'

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    env:
      SANDTRACE_API_KEY: ${{ secrets.SANDTRACE_API_KEY }}
      SANDTRACE_CLOUD_URL: ${{ inputs.sandtrace_cloud_url || secrets.SANDTRACE_CLOUD_URL }}
    steps:
      - uses: actions/checkout@v4

      - name: Install sandtrace
        # Fetched from the public upstream release over plain HTTPS — no token.
        # The binary is checksum-verified against the published SHA-256 manifest
        # before it runs (it's a security tool; don't execute an unverified blob).
        run: |
          dir="sandtrace-v${SANDTRACE_VERSION}-x86_64-unknown-linux-gnu"
          asset="${dir}.tar.gz"
          base="https://github.com/${SANDTRACE_REPO}/releases/download/v${SANDTRACE_VERSION}"
          # Download the tarball under its real release name so the published
          # checksum line (`<sha256>  <asset>`) verifies as-is via `sha256sum -c`.
          curl -fsSL "${base}/${asset}" -o "${asset}"
          curl -fsSL "${base}/sandtrace-v${SANDTRACE_VERSION}-checksums-sha256.txt" -o sandtrace.sha256
          grep "  ${asset}$" sandtrace.sha256 | sha256sum -c -
          tar xzf "${asset}"
          sudo mv "${dir}/sandtrace" /usr/local/bin/
          rm -rf "${asset}" sandtrace.sha256 "${dir}"
          sandtrace --version

      - name: Initialize sandtrace
        run: sandtrace init

      - name: Run audit
        # Gate at CRITICAL only. With --deep on, medium/high includes direct-dep
        # version freshness (a fresh upstream release is advisory, not a failure).
        # Genuine criticals (public-registry typosquats, real package-not-found)
        # still block. Medium/high are surfaced via the SARIF report below.
        run: sandtrace audit . --severity critical ${{ inputs.deep && '--deep' || '' }}

      - name: Generate and upload SBOM
        if: ${{ env.SANDTRACE_API_KEY != '' && env.SANDTRACE_CLOUD_URL != '' }}
        run: sandtrace sbom . --output sandtrace.bom.json

      - name: Run obfuscation scan
        run: sandtrace scan . --verbose

      - name: Generate SARIF report
        if: always()
        run: sandtrace audit . --format sarif --severity medium > sandtrace.sarif || true

      - name: Upload SARIF to GitHub Security
        if: always() && github.event_name == 'push'
        continue-on-error: true
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: sandtrace.sarif
          category: sandtrace
